services:
  - type: web
    name: segurancaovip
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: REDIRECT_URI
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: LOG_WEBHOOK
        sync: false
